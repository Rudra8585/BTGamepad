name: Android APK Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # This magic step sets up Gradle automatically even if your repo is missing the wrapper files!
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # We run the build via the system's global gradle command instead of the local wrapper
      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BTGamepad-debug-${{ github.run_number }}
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 30
          if-no-files-found: error
