name: Android APK Build
 
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
 
jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
 
    steps:
      # ── 1. Checkout source ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
 
      # ── 2. Set up JDK 17 ───────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
 
      # ── 3. Bootstrap Gradle wrapper files ──────────────────────────────
      #    gradle-wrapper.jar is a binary (~60 KB) that shouldn't live in git.
      #    We download it here and write the .properties file if missing.
      - name: Bootstrap Gradle wrapper
        run: |
          mkdir -p gradle/wrapper
 
          # Download the wrapper JAR for Gradle 8.4
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
 
          # Write properties only if the file isn't already in the repo
          if [ ! -f gradle/wrapper/gradle-wrapper.properties ]; then
            cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS
          fi
 
          # Write gradlew script only if it isn't already in the repo
          if [ ! -f gradlew ]; then
            curl -fsSL \
              "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew" \
              -o gradlew
          fi
 
      # ── 4. Grant execute permission to Gradle wrapper ──────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew
 
      # ── 5. Cache Gradle packages ───────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
 
      # ── 6. Build debug APK ─────────────────────────────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
 
      # ── 7. Upload APK artifact ─────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BTGamepad-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
 
