Here's a full breakdown of everything delivered:

What you got
1. HID Report Descriptor (HidDescriptor.kt)
A precisely hand-crafted 9-byte report with the matching raw descriptor bytes:

Byte	Field	Detail
[0]	buttons_1	A B X Y LB RB Start Select (1 bit each)
[1]	buttons_2	L3 R3 Home + 4 padding bits = 2 full bytes
[2]	dpad_hat	HAT switch 0–7 (N/NE/E…NW), 8=centred
[3–4]	LX / LY	Left stick, 0–255, centre=128
[5–6]	RX / RY	Right stick, same scale
[7–8]	LT / RT	Triggers, 0–255
The descriptor is structured so Windows, Linux, and Android hosts auto-recognise it as a standard gamepad with no driver install.

2. Core Kotlin implementation
InputModels.kt — Sealed class hierarchy: SourceInput (physical key / axis / virtual button / axis) maps to ReportTarget (button bit, D-Pad HAT, or axis byte). DPadState handles diagonal combinations correctly.

RemappingManager.kt — Thread-safe engine that:

Maintains the live 9-byte report
Converts MotionEvent axis floats (-1…1) to 0–255 bytes with proper trigger vs. stick scaling
Tracks 4 D-Pad directions independently → correct HAT diagonals
Has a full default mapping for Retroid Pocket 5 / standard Android keycodes
Exposes remapPhysicalKey() / remapVirtualButton() for hot-swapping bindings
BluetoothHidService.kt — Foreground service that registers the SDP record, handles BluetoothHidDevice.Callback lifecycle (registered → connected → disconnected), and calls sendReport() after each input change.

VirtualJoystickView.kt — Custom View with circular clamp, normalised output, and finger-lift snap-to-centre.

MainActivity.kt — Wires everything together. Handles onKeyDown/onKeyUp/onGenericMotionEvent for physical controllers, and touch events for the on-screen pad.

3. android.yml GitHub Actions workflow
Push to main → JDK 17 setup → Gradle cache → ./gradlew assembleDebug → APK uploaded as a downloadable artifact named BTGamepad-debug-<run_number> (retained 30 days). A commented-out release signing block is included for when you add keystore secrets.

