name: Android APK Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Generate Gradle Wrapper files on the fly
      # This fixes the "Could not find GradleWrapperMain" error
      - name: Setup Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS
          
          cat > gradlew << 'EOF'
          #!/bin/bash
          gradle "$@"
          EOF
          chmod +x gradlew

      # 4. Build debug APK
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 5. Upload debug APK artifact
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BTGamepad-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
